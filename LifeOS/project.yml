name: LifeOS
options:
  bundleIdPrefix: app.lifeos
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    MARKETING_VERSION: "1.00"
    CURRENT_PROJECT_VERSION: "100"
    ENABLE_USER_SCRIPT_SANDBOXING: "NO"
targets:
  LifeOS:
    type: application
    platform: iOS
    sources:
      - path: LifeOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lifeos.ios
        INFOPLIST_FILE: LifeOS/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: "NO"
        GENERATE_INFOPLIST_FILE: "NO"
  LifeOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LifeOSTests
    dependencies:
      - target: LifeOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.lifeos.ios.tests
        INFOPLIST_FILE: LifeOSTests/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
